name: Setup Script CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Fast validation - runs on every push/PR
  test:
    runs-on: macos-latest
    name: Validate Setup Script
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Make scripts executable
      run: chmod +x setup-macos.sh test-setup.sh
      
    - name: Run test suite
      run: ./test-setup.sh
      timeout-minutes: 5
